<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0d1117;
    color: white;
    text-align: center;
}

nav {
    padding: 22px 0;
    background: #05070a;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 18px;
    font-weight: bold;
}

nav a:hover {
    color: #58a6ff;
}

header {
    padding: 70px 20px 30px;
}

h1 {
    font-size: 3rem;
}

p {
    font-size: 1.1rem;
    line-height: 1.6;
}

.gallery {
    padding: 40px 20px 80px;
    display: grid;
    gap: 35px;
    max-width: 1100px;
    margin: auto;
}

.project-card {
    background: #161b22;
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 0 20px rgba(0,0,0,0.35);
}

.project-card h2 {
    margin-top: 0;
}

.photo-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.photo-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 14px;
}

.label {
    margin-top: 10px;
    font-weight: bold;
    color: #58a6ff;
}

.button {
    display: inline-block;
    margin: 40px 10px 0;
    padding: 16px 32px;
    background: white;
    color: #0b3d91;
    text-decoration: none;
    font-weight: bold;
    border-radius: 10px;
}

footer {
    padding: 30px;
    background: #05070a;
}

@media (max-width: 768px) {
    nav a {
        margin: 0 8px;
        font-size: 0.95rem;
    }

    h1 {
        font-size: 2.3rem;
    }

    .photo-row {
        grid-template-columns: 1fr;
    }

    .photo-box img {
        height: auto;
    }
}
</style>
</head>
